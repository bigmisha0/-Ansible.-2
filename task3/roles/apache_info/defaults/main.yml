---
# Значения по умолчанию для роли apache_info.
# Подбираются автоматически в зависимости от семейства ОС,
# чтобы роль работала как на RedHat-подобных, так и на Debian-подобных системах.

apache_package: >-
  {{ 'httpd' if ansible_facts['os_family'] == 'RedHat' else 'apache2' }}

apache_service: >-
  {{ 'httpd' if ansible_facts['os_family'] == 'RedHat' else 'apache2' }}

apache_doc_root: /var/www/html
